{% extends "base.html" %}
{% block title %}Kanban — JonathanOS{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='kanban.css') }}">
{% endblock %}
{% block content %}
  <div id="app" class="kanban-page">
    <div class="kanban-layout">
      <main class="kanban-main">
        <!-- Stats Bar -->
        <div class="kanban-stats" id="kanban-stats">
          <span class="stat-item">0 This week</span>
          <span class="stat-dot">·</span>
          <span class="stat-item">0 In progress</span>
          <span class="stat-dot">·</span>
          <span class="stat-item">0 Total</span>
          <span class="stat-dot">·</span>
          <span class="stat-item">0% Completion</span>
        </div>

        <!-- Controls Row -->
        <div class="kanban-controls">
          <div class="controls-left">
            <button class="btn-primary" id="btn-add-task">+ New Task</button>
            <div class="agent-tabs" id="agent-tabs">
              <button class="agent-tab active" data-agent="">All</button>
              <button class="agent-tab" data-agent="main">Bill</button>
              <button class="agent-tab" data-agent="Scout">Scout</button>
              <button class="agent-tab" data-agent="Shark">Shark</button>
              <button class="agent-tab" data-agent="ACE">ACE</button>
              <button class="agent-tab" data-agent="Quill">Quill</button>
              <button class="agent-tab" data-agent="Pixel">Pixel</button>
            </div>
          </div>
          <div class="controls-right">
            <select id="filter-project" class="select-pill">
              <option value="">All projects</option>
            </select>
            <select id="filter-priority" class="select-pill">
              <option value="">All Priority</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <input type="text" id="filter-search" class="search-input" placeholder="Search..." />
            <input type="hidden" id="filter-agent" value="" />
          </div>
        </div>

        <!-- Board -->
        <div class="kanban-board" id="kanban-board">
          <!-- Columns injected by JS -->
        </div>
      </main>

      <!-- Recent Activity Panel -->
      <aside class="kanban-activity">
        <div class="activity-header" title="Recent git, cron, and memory events">Recent Activity</div>
        <div class="activity-list" id="activity-list"></div>
      </aside>
    </div>
  </div>

  <!-- ── NEW TASK MODAL ──────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="mc-modal" id="task-modal">
      <div class="modal-header">
        <span id="modal-title">NEW TASK</span>
        <button class="modal-close" id="btn-modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <label>Title *</label>
          <input type="text" id="task-title" class="mc-input" placeholder="Task title..." />
        </div>
        <div class="field-row">
          <label>Description</label>
          <textarea id="task-desc" class="mc-textarea" rows="3" placeholder="Optional description..."></textarea>
        </div>
        <div class="field-row two-col">
          <div>
            <label>Column</label>
            <select id="task-column" class="mc-select">
              <option value="INBOX">INBOX</option>
              <option value="PLANNING">PLANNING</option>
              <option value="IN PROGRESS">IN PROGRESS</option>
              <option value="TESTING">TESTING</option>
              <option value="REVIEW">REVIEW</option>
              <option value="BLOCKED">BLOCKED</option>
              <option value="DONE">DONE</option>
            </select>
          </div>
          <div>
            <label>Priority</label>
            <select id="task-priority" class="mc-select">
              <option value="medium">Medium</option>
              <option value="low">Low</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div class="field-row two-col">
          <div>
            <label>Agent</label>
            <select id="task-agent" class="mc-select">
              <option value="">Unassigned</option>
              <option value="main">Bill/Main</option>
              <option value="Scout">Scout</option>
              <option value="Shark">Shark</option>
              <option value="ACE">ACE</option>
              <option value="Quill">Quill</option>
              <option value="Pixel">Pixel</option>
            </select>
          </div>
          <div>
            <label>Due Date</label>
            <input type="date" id="task-due" class="mc-input" />
          </div>
        </div>
        <div class="field-row">
          <label>Tags</label>
          <input type="text" id="task-tags" class="mc-input" placeholder="tag1, tag2, ..." />
        </div>

        <!-- AI Planning -->
        <div class="ai-plan-section">
          <button class="mc-btn-secondary" id="btn-ai-plan">🤖 AI PLAN THIS TASK</button>
          <div id="ai-plan-result" class="ai-plan-result hidden"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="mc-btn-ghost" id="btn-modal-cancel">CANCEL</button>
        <button class="mc-btn" id="btn-modal-save">SAVE TASK</button>
      </div>
    </div>
  </div>

  <!-- ── TASK DETAIL MODAL ──────────────────────────────────── -->
  <div id="detail-overlay" class="modal-overlay hidden">
    <div class="mc-modal mc-modal-wide" id="detail-modal">
      <div class="modal-header">
        <span id="detail-title">TASK DETAIL</span>
        <div>
          <button class="mc-btn-xs danger" id="btn-detail-delete">DELETE</button>
          <button class="modal-close" id="btn-detail-close">✕</button>
        </div>
      </div>
      <div class="modal-body" id="detail-body">
        <!-- Injected by JS -->
      </div>
      <div class="modal-footer">
        <button class="mc-btn-ghost" id="btn-detail-cancel">CLOSE</button>
        <button class="mc-btn" id="btn-detail-save">UPDATE</button>
      </div>
    </div>
  </div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='kanban.js') }}"></script>
{% endblock %}
