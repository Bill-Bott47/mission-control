{% extends "base.html" %}
{% block title %}Tasks — Mission Control{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='tasks.css') }}">
{% endblock %}
{% block content %}
<div class="tasks-container">
    <div class="page-header">
        <h1>Task Tracker</h1>
        <div class="card-meta" id="tasks-meta">Loading...</div>
    </div>

    <section class="card" style="margin-bottom: 20px;">
        <h2 style="margin-bottom: 12px;">Filters</h2>
        <div class="tasks-filters">
            <label>
                Status
                <select id="filter-status">
                    <option value="ALL">All</option>
                </select>
            </label>
            <label>
                Priority
                <select id="filter-priority">
                    <option value="ALL">All</option>
                </select>
            </label>
            <label>
                Agent
                <select id="filter-agent">
                    <option value="ALL">All</option>
                </select>
            </label>
            <label>
                Owner
                <select id="filter-owner">
                    <option value="ALL">All</option>
                </select>
            </label>
            <label class="search">
                Search
                <input id="filter-search" type="text" placeholder="ID, title, owner, context...">
            </label>
        </div>
    </section>

    <section class="card">
        <h2>Tasks <span id="task-count"></span></h2>
        <div id="tasks-table-wrap" class="tasks-table-wrap">
            <div class="placeholder">Loading tasks...</div>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='tasks.js') }}"></script>
{% endblock %}
