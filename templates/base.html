<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mission Control{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='shell.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="{{ body_class|default('') }}">
    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo">⬡</div>
                <div>
                    <div class="brand-title">Mission Control</div>
                    <div class="brand-sub">v2 command layer</div>
                </div>
            </div>
            <nav class="nav">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🏠</span>Dashboard</span>
                </a>
                <a href="/kanban" class="{% if request.path.startswith('/kanban') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🧩</span>Tasks</span>
                </a>
                <a href="/content" class="{% if request.path.startswith('/content') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🧪</span>Content</span>
                </a>
                <a href="/calendar" class="{% if request.path.startswith('/calendar') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">📅</span>Calendar</span>
                </a>
                <a href="/team" class="{% if request.path.startswith('/team') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🧑‍🤝‍🧑</span>Team</span>
                </a>
                <a href="/projects" class="{% if request.path.startswith('/projects') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🧭</span>Projects</span>
                </a>
                <a href="/memory" class="{% if request.path.startswith('/memory') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🧠</span>Memory</span>
                </a>
                <a href="/docs" class="{% if request.path.startswith('/docs') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">📚</span>Docs</span>
                </a>
                <a href="/approvals" class="nav-approvals {% if request.path.startswith('/approvals') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">✅</span>Approvals</span>
                    <span id="approvals-badge" class="badge">0</span>
                </a>
                <a href="/council" class="{% if request.path.startswith('/council') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🏛️</span>Council</span>
                </a>
                <a href="/usage" class="{% if request.path.startswith('/usage') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">📊</span>Usage</span>
                </a>
                <a href="/office" class="{% if request.path.startswith('/office') %}active{% endif %}">
                    <span class="nav-left"><span class="nav-icon">🏙️</span>Office</span>
                </a>
            </nav>
        </aside>
        <main class="main">
            <section class="ticker global-ticker" aria-label="Trading signal ticker">
                <div class="ticker-label">SHARK CALLS</div>
                <div class="ticker-overflow">
                    <div class="ticker-track" id="global-ticker-track">
                        <div class="ticker-item">Loading signals...</div>
                    </div>
                </div>
            </section>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='shell.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
