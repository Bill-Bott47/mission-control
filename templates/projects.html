{% extends "base.html" %}
{% block title %}Projects — JonathanOS{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='projects.css') }}">
{% endblock %}
{% block content %}
<header class="page-header">
    <h1>Projects</h1>
    <span class="subtle">Separate finite projects from ongoing operations and research wikis</span>
</header>

<div class="project-tabs" id="project-tabs"></div>
<div class="projects-grid" id="projects-grid"></div>

<div class="project-overlay hidden" id="project-overlay"></div>
<div class="project-modal" id="project-detail">
    <div class="detail-header">
        <h2 id="detail-name">Project</h2>
        <button class="btn btn-ghost" id="detail-close">Close</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='projects.js') }}"></script>
{% endblock %}
