{% extends "base.html" %}
{% block title %}Office — JonathanOS{% endblock %}
{% block head %}
<style>
    .office-frame-wrap {
        width: 100%;
        height: calc(100vh - 120px);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.08);
        background: #1a1a2e;
    }
    .office-frame-wrap iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
{% endblock %}
{% block content %}
<header class="page-header">
    <h1>Office</h1>
    <div class="subtle">Live agent workspace — who's doing what, right now</div>
</header>

<div class="office-frame-wrap">
    <iframe src="http://127.0.0.1:19000" title="Star Office"></iframe>
</div>
{% endblock %}
