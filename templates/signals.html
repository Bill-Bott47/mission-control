{% extends "base.html" %}
{% block title %}Signals — JonathanOS{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='signals.css') }}">
{% endblock %}
{% block content %}
<header class="page-header">
    <h1>Market Signals</h1>
    <span class="subtle" id="signals-meta">Latest Shark + ICT calls</span>
</header>

<div id="signals-stale" class="stale-badge hidden"></div>
<div id="signals-note" class="signals-note hidden"></div>
<section class="signals-columns">
    <div class="signals-col">
        <h2>Longs</h2>
        <div class="signals-list" id="signals-longs"></div>
    </div>
    <div class="signals-col">
        <h2>Shorts</h2>
        <div class="signals-list" id="signals-shorts"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='signals.js') }}"></script>
{% endblock %}
