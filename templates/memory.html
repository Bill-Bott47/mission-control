{% extends "base.html" %}
{% block title %}Memory — JonathanOS{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='memory.css') }}">
{% endblock %}
{% block content %}
<header class="page-header">
    <h1>Memory</h1>
    <div class="memory-controls">
        <input type="text" id="memory-search" placeholder="Search memory files..." />
        <button class="btn btn-secondary" id="memory-refresh">Refresh</button>
    </div>
</header>

<div class="memory-layout">
    <div class="memory-files">
        <h2>Files</h2>
        <div id="files-list" class="file-list"></div>
    </div>
    
    <div class="memory-viewer">
        <h2>Content</h2>
        <div id="file-content" class="file-content">Select a file to view</div>
    </div>
    
    <div class="memory-search">
        <h2>Search Results</h2>
        <div id="search-results" class="search-results">Enter search query</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='memory.js') }}"></script>
{% endblock %}
